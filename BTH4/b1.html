<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý điểm sinh viên</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:40px;
}

input, button{
    padding:6px;
    margin:5px;
}

table{
    border-collapse: collapse;
    width:600px;
    margin-top:20px;
}

th, td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#eee;
}

.yeu{
    background: yellow;
}

button{
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Quản lý điểm sinh viên</h2>

<input id="name" placeholder="Họ tên">
<input id="score" type="number" placeholder="Điểm (0-10)">
<button id="addBtn">Thêm</button>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<p id="stat"></p>

<script>

let students = []

function classify(score){
    if(score >= 8.5) return "Giỏi"
    if(score >= 7) return "Khá"
    if(score >= 5) return "Trung bình"
    return "Yếu"
}

function renderTable(){

    const tbody = document.getElementById("tableBody")
    tbody.innerHTML = ""

    let total = 0

    students.forEach((sv,index)=>{

        total += sv.score

        let tr = document.createElement("tr")

        if(sv.score < 5){
            tr.classList.add("yeu")
        }

        tr.innerHTML = `
        <td>${index+1}</td>
        <td>${sv.name}</td>
        <td>${sv.score}</td>
        <td>${classify(sv.score)}</td>
        <td>
            <button data-index="${index}">Xóa</button>
        </td>
        `

        tbody.appendChild(tr)

    })

    const avg = students.length ? (total/students.length).toFixed(2) : 0

    document.getElementById("stat").innerText =
    `Tổng sinh viên: ${students.length} | Điểm trung bình: ${avg}`
}


function addStudent(){

    const nameInput = document.getElementById("name")
    const scoreInput = document.getElementById("score")

    const name = nameInput.value.trim()
    const score = Number(scoreInput.value)

    if(name === "" || isNaN(score) || score < 0 || score > 10){
        alert("Vui lòng nhập đúng họ tên và điểm từ 0-10")
        return
    }

    students.push({
        name:name,
        score:score
    })

    renderTable()

    nameInput.value = ""
    scoreInput.value = ""

    nameInput.focus()
}


document.getElementById("addBtn").addEventListener("click", addStudent)


document.getElementById("score").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        addStudent()
    }
})


document.getElementById("tableBody").addEventListener("click", function(e){

    if(e.target.tagName === "BUTTON"){

        const index = e.target.dataset.index

        students.splice(index,1)

        renderTable()
    }

})
</script>

</body>
</html>
