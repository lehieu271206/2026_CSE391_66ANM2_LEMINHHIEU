<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<style>

body{
    font-family: Arial;
    margin:40px;
}

.form-group{
    margin-bottom:20px;
}

input{
    padding:8px;
    width:250px;
}

#charCount{
    font-size:14px;
    color:gray;
}

.password-wrapper{
    position:relative;
    display:inline-block;
}

#togglePass{
    position:absolute;
    right:10px;
    top:7px;
    cursor:pointer;
}

#strengthBar{
    height:8px;
    width:250px;
    background:#ddd;
    margin-top:6px;
}

#strengthLevel{
    height:100%;
    width:0%;
}

.weak{
    background:red;
}

.medium{
    background:orange;
}

.strong{
    background:green;
}

#strengthText{
    font-size:14px;
}

</style>

</head>
<body>

<h2>Form Đăng Ký</h2>

<div class="form-group">

<label>Họ tên</label><br>

<input id="fullname" maxlength="50">

<div id="charCount">0/50</div>

</div>


<div class="form-group">

<label>Mật khẩu</label><br>

<div class="password-wrapper">

<input type="password" id="password">

<span id="togglePass">👁</span>

</div>

<div id="strengthBar">
<div id="strengthLevel"></div>
</div>

<div id="strengthText"></div>

</div>


<script>

const fullname = document.getElementById("fullname")
const charCount = document.getElementById("charCount")

fullname.addEventListener("input",function(){

let len = this.value.length

charCount.textContent = len + "/50"

})



const password = document.getElementById("password")
const level = document.getElementById("strengthLevel")
const text = document.getElementById("strengthText")

password.addEventListener("input",function(){

let pass = this.value

let score = 0

if(pass.length >= 6) score++
if(/[A-Z]/.test(pass)) score++
if(/[0-9]/.test(pass)) score++
if(/[^A-Za-z0-9]/.test(pass)) score++

if(score <=1){

level.style.width="33%"
level.className="weak"
text.textContent="Yếu"

}

else if(score<=3){

level.style.width="66%"
level.className="medium"
text.textContent="Trung bình"

}

else{

level.style.width="100%"
level.className="strong"
text.textContent="Mạnh"

}

})



const toggle = document.getElementById("togglePass")

toggle.addEventListener("click",function(){

if(password.type === "password"){

password.type = "text"

}else{

password.type = "password"

}

})

</script>

</body>
</html>
