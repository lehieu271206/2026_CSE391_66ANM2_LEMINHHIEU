<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

body{
    font-family: Arial;
    margin:40px;
    
}

.form-group{
    margin-bottom:15px;
}

input{
    padding:6px;
    width:250px;
}

.error{
    color:red;
    font-size:14px;
}

.success{
    color:green;
    font-size:22px;
    font-weight:bold;
}

button{
    padding:8px 16px;
    cursor:pointer;
}

</style>

</head>
<body>

<div class="container my-5">
    <div class="row p-4 pb-0 pe-lg-0 pt-lg-5 align-items-center rounded-3 border shadow-lg">
      <div class="col-lg-7 p-3 p-lg-5 pt-lg-3">
        <h1 class="display-4 fw-bold lh-1">Đăng ký tài khoản</h1>
            <form id="registerForm">

<div class="form-group">
<label>Họ và tên</label><br>
<input type="text" id="fullname">
<div class="error" id="fullnameError"></div>
</div>

<div class="form-group">
<label>Email</label><br>
<input type="text" id="email">
<div class="error" id="emailError"></div>
</div>

<div class="form-group">
<label>Số điện thoại</label><br>
<input type="text" id="phone">
<div class="error" id="phoneError"></div>
</div>

<div class="form-group">
<label>Mật khẩu</label><br>
<input type="password" id="password">
<div class="error" id="passwordError"></div>
</div>

<div class="form-group">
<label>Xác nhận mật khẩu</label><br>
<input type="password" id="confirmPassword">
<div class="error" id="confirmPasswordError"></div>
</div>

<div class="form-group">
<label>Giới tính</label><br>
<input type="radio" name="gender" value="Nam"> Nam
<br>
<input type="radio" name="gender" value="Nữ"> Nữ
<div class="error" id="genderError"></div>
</div>

<div class="form-group">
<input type="checkbox" id="terms"> Tôi đồng ý điều khoản
<div class="error" id="termsError"></div>
</div>

<button type="submit">Đăng ký</button>

</form>

<div id="successMessage" class="success"></div>
        <div class="d-grid gap-2 d-md-flex justify-content-md-start mb-4 mb-lg-3">
        </div>
      </div>
    </div>
  </div>

<script>

const form = document.getElementById("registerForm")

const fullname = document.getElementById("fullname")
const email = document.getElementById("email")
const phone = document.getElementById("phone")
const password = document.getElementById("password")
const confirmPassword = document.getElementById("confirmPassword")
const terms = document.getElementById("terms")

function showError(field,message){
document.getElementById(field+"Error").textContent=message
}

function clearError(field){
document.getElementById(field+"Error").textContent=""
}

function validateFullname(){

const value=fullname.value.trim()
const regex=/^[A-Za-zÀ-ỹ\s]{3,}$/

if(value===""){
showError("fullname","Không được để trống")
return false
}

if(!regex.test(value)){
showError("fullname","Ít nhất 3 ký tự và chỉ chứa chữ")
return false
}

clearError("fullname")
return true
}

function validateEmail(){

const value=email.value.trim()
const regex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/

if(value===""){
showError("email","Email không được trống")
return false
}

if(!regex.test(value)){
showError("email","Email không đúng định dạng")
return false
}

clearError("email")
return true
}

function validatePhone(){

const value=phone.value.trim()
const regex=/^0\d{9}$/

if(value===""){
showError("phone","Số điện thoại không được trống")
return false
}

if(!regex.test(value)){
showError("phone","Số điện thoại phải 10 số và bắt đầu bằng 0")
return false
}

clearError("phone")
return true
}

function validatePassword(){

const value=password.value
const regex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/

if(value===""){
showError("password","Mật khẩu không được trống")
return false
}

if(!regex.test(value)){
showError("password","≥8 ký tự gồm chữ hoa, chữ thường và số")
return false
}

clearError("password")
return true
}

function validateConfirmPassword(){

if(confirmPassword.value===""){
showError("confirmPassword","Vui lòng xác nhận mật khẩu")
return false
}

if(confirmPassword.value!==password.value){
showError("confirmPassword","Mật khẩu không khớp")
return false
}

clearError("confirmPassword")
return true
}

function validateGender(){

const gender=document.querySelector('input[name="gender"]:checked')

if(!gender){
showError("gender","Vui lòng chọn giới tính")
return false
}

clearError("gender")
return true
}

function validateTerms(){

if(!terms.checked){
showError("terms","Bạn phải đồng ý điều khoản")
return false
}

clearError("terms")
return true
}

form.addEventListener("submit",function(e){

e.preventDefault()

const valid=
validateFullname() &
validateEmail() &
validatePhone() &
validatePassword() &
validateConfirmPassword() &
validateGender() &
validateTerms()

if(valid){

const name=fullname.value

form.style.display="none"

document.getElementById("successMessage").textContent=
"Đăng ký thành công 🎉 Xin chào "+name

}

})

fullname.addEventListener("blur",validateFullname)
email.addEventListener("blur",validateEmail)
phone.addEventListener("blur",validatePhone)
password.addEventListener("blur",validatePassword)
confirmPassword.addEventListener("blur",validateConfirmPassword)

fullname.addEventListener("input",()=>clearError("fullname"))
email.addEventListener("input",()=>clearError("email"))
phone.addEventListener("input",()=>clearError("phone"))
password.addEventListener("input",()=>clearError("password"))
confirmPassword.addEventListener("input",()=>clearError("confirmPassword"))

</script>

</body>
</html>
